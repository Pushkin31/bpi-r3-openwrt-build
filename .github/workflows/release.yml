name: Build OpenWrt Firmware (Release)

on:
  workflow_dispatch:
    inputs:
      openwrt_ref:
        description: OpenWrt git ref (tag/branch/commit), e.g. v24.10.0
        required: false
        default: 24.10.5
        type: string
      build_number:
        description: Custom build number override (optional)
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-test-and-release:
    uses: ./.github/workflows/reusable-openwrt-build.yml
    with:
      publish_release: true
      openwrt_ref: ${{ inputs.openwrt_ref || '24.10.5' }}
      build_number: ${{ inputs.build_number }}
