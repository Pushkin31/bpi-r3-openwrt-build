name: Build OpenWrt Firmware (Build-Only)

on:
  workflow_dispatch:
    inputs:
      openwrt_ref:
        description: OpenWrt git ref (tag/branch/commit), e.g. v24.10.0
        required: false
        default: v24.10.0
        type: string

permissions:
  contents: write

jobs:
  build-and-test:
    uses: ./.github/workflows/reusable-openwrt-build.yml
    with:
      publish_release: false
      openwrt_ref: ${{ inputs.openwrt_ref || 'v24.10.0' }}
